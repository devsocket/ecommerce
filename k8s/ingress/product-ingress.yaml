apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: product.local
      http:
        paths:
          - path: /api/v1/products/create
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 8081